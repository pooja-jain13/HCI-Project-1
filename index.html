map.on('load', () => {

map.addSource('art', {
type: 'geojson',
data: artData
});

map.addLayer({
id: 'art-points',
type: 'circle',
source: 'art',
paint: {
'circle-radius': 7,
'circle-color': '#E63946'
}
});

map.on('click', 'art-points', (e) => {

const props = e.features[0].properties;
const coords = e.features[0].geometry.coordinates.slice();

const popupHTML = `
<div class="popup-container ${props.layout || 'vertical'}">

  <img class="popup-image" src="${props.image}">

  <div class="popup-text">
    <div class="popup-title">${props.title}</div>
    <div class="popup-artist">${props.artist}</div>
    <div class="popup-description">${props.description}</div>
  </div>

</div>
`;

new mapboxgl.Popup()
.setLngLat(coords)
.setHTML(popupHTML)
.addTo(map);

});

map.on('mouseenter', 'art-points', () => {
map.getCanvas().style.cursor = 'pointer';
});

map.on('mouseleave', 'art-points', () => {
map.getCanvas().style.cursor = '';
});

});
