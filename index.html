<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NYC Public Art Map</title>

<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 0;
}

#map {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 100%;
}

.mapboxgl-popup img {
  width: 200px;
  margin-top: 8px;
  border-radius: 6px;
}

.popup-title {
  font-weight: bold;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

mapboxgl.accessToken = 'pk.eyJ1IjoicGphaW42ODAxIiwiYSI6ImNtbDA3cHZ4bDBhNXkzbHEyMjE5ODR1azUifQ.zkm5kg40QRzCBkbFqr6ZnA';

const map = new mapboxgl.Map({
container: 'map',
style: 'mapbox://styles/mapbox/outdoors-v12',
center: [-73.98, 40.74],
zoom: 10
});

const artData = {
"type": "FeatureCollection",
"features": [
{
"type": "Feature",
"properties": {
"title": "The Baayfalls",
"artist": "Jordan Casteel",
"description": "The Baayfalls (2017/2019) is a 1,400-square-foot mural by Jordan Casteel, displayed on the High Line in NYC. It depicts Senegalese-born street vendors Fallou and her brother, Baaye Demba Sow, who are members of the Baye Fall Sufi sect. The painting highlights themes of community and Black, everyday life.",
"image": "https://i.imgur.com/ArzWaqw.jpeg"
},
"geometry": {
"type": "Point",
"coordinates": [-74.0048, 40.7480]
}
},
{
"type": "Feature",
"properties": {
"title": "Unity",
"artist": "Hank Willis Thomas",
"description": "Unity is a 22.5-foot bronze sculpture by artist Hank Willis Thomas in Downtown Brooklyn (installed 2019) that serves as a permanent public monument. Inspired by the Statue of Liberty and a basketball player's gesture, it symbolizes community, ambition, and the Brooklyn spirit. The piece represents a muscular arm pointing upward.",
"image": "https://i.imgur.com/58wELhI.jpeg"
},
"geometry": {
"type": "Point",
"coordinates": [-73.989175, 40.696206]
}
},
{
"type": "Feature",
"properties": {
"title": "Go",
"artist": "Kehinde Wiley",
"description": "Kehinde Wiley’s Go (2020) is a permanent, hand-painted stained-glass triptych ceiling installation in Moynihan Train Hall, NYC. It depicts young Black New Yorkers in breakdance poses against a blue sky, referencing Renaissance frescoes to blend urban culture with classical art. This 85-foot-long, backlit work celebrates motion, joy, and survival.",
"image": "https://i.imgur.com/Js1BhOE.jpeg"
},
"geometry": {
"type": "Point",
"coordinates": [-73.9935, 40.7506]
}
},
{
"type": "Feature",
"properties": {
"title": "Eyes on the Street",
"artist": "Jamel Shabazz",
"description": "KeJamel Shabazz: Eyes on the Street is a 40-year retrospective (1980–2020) celebrating the Brooklyn-born photographer’s iconic documentation of NYC street life. The collection highlights the vibrancy, fashion, and community spirit of the outer boroughs, particularly during the 1980s, focusing on the humanity and dignity of everyday people.hinde Wiley’s Go (2020) is a permanent, hand-painted stained-glass triptych ceiling installation in Moynihan Train Hall, NYC. It depicts young Black New Yorkers in breakdance poses against a blue sky, referencing Renaissance frescoes to blend urban culture with classical art. This 85-foot-long, backlit work celebrates motion, joy, and survival.",
"image": "https://i.imgur.com/RkN3q3H.png"
},
"geometry": {
"type": "Point",
"coordinates": [-73.9270, 40.8315]
}
}
{
"type": "Feature",
"properties": {
"title": "Brick House",
"artist": "Simone Leigh",
"description": "Brick House (2019) is a 16-foot-tall bronze sculpture installed on the High Line. The monumental figure combines features of African architecture and traditional pottery with the form of a Black woman. The work celebrates Black femininity, resilience, and cultural heritage.",
"image": "https://i.imgur.com/Mu4fPVV.jpeg"
},
"geometry": {
"type": "Point",
"coordinates": [-74.0049, 40.7479]
}
}


{
"type": "Feature",
"properties": {
"title": "Triumph of the Human Spirit",
"artist": "Lorenzo Pace",
"description": "Triumph of the Human Spirit (2000) is a 50-foot black granite sculpture in Foley Square. Inspired by African forms, it honors the enslaved Africans buried nearby at the African Burial Ground and reflects themes of memory, resilience, and justice.",
"image": "https://i.imgur.com/aR2Pnv9.jpeg"
},
"geometry": {
"type": "Point",
"coordinates": [-74.0030, 40.7145]
}
}

]
};

map.on('load', () => {

map.addSource('art', {
type: 'geojson',
data: artData
});

map.addLayer({
id: 'art-points',
type: 'circle',
source: 'art',
paint: {
'circle-radius': 7,
'circle-color': '#E63946'
}
});

map.on('click', 'art-points', (e) => {

const props = e.features[0].properties;
const coords = e.features[0].geometry.coordinates.slice();

const popupHTML = `
<div>
<div class="popup-title">${props.title}</div>
<div>${props.artist}</div>
<div>${props.description}</div>
<img src="${props.image}">
</div>
`;

new mapboxgl.Popup()
.setLngLat(coords)
.setHTML(popupHTML)
.addTo(map);

});

map.on('mouseenter', 'art-points', () => {
map.getCanvas().style.cursor = 'pointer';
});

map.on('mouseleave', 'art-points', () => {
map.getCanvas().style.cursor = '';
});

});

</script>

</body>
</html>
